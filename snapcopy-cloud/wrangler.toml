name = "snapcopy-cloud-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"

[vars]
CLOUD_ENHANCEMENT_ENABLED = "true"
DEFAULT_PLAN = "beta"
DEFAULT_PROVIDER = "deepseek"
GEMINI_MODEL = "gemini-2.5-flash"
DEEPSEEK_MODEL = "deepseek-v4-flash"
DEEPSEEK_BASE_URL = "https://api.deepseek.com"
QWEN_MODEL = "qwen-plus"
QWEN_BASE_URL = "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
VISION_PROVIDER = "ppq"
GLM_MODEL = "glm-4.6v"
GLM_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
PPQ_MODEL = "glm-4.6v"
PPQ_BASE_URL = "https://api.ppq.ai"
RATE_LIMIT_USER_PER_MINUTE = "6"
RATE_LIMIT_IP_PER_MINUTE = "30"
MAX_NEW_USERS_PER_IP_PER_DAY = "20"
MAX_REAL_PROVIDER_REQUESTS_PER_DAY = "200"
DAILY_GLOBAL_COST_LIMIT_USD = "50.00"
MONTHLY_GLOBAL_COST_LIMIT_USD = "1000.00"
PLUS_MONTHLY_COST_ALERT_USD = "0.80"
PRO_MONTHLY_COST_ALERT_USD = "4.00"
OPTIMIZATION_MIN_CAPTION_SAMPLES = "200"
OPTIMIZATION_COOLDOWN_HOURS = "72"
OPTIMIZATION_MAX_BUCKETS_PER_RUN = "8"
ALLOW_CLIENT_PLAN_OVERRIDE = "true"

[triggers]
crons = ["0 18 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "snapcopy-cloud-db"
database_id = "f40872c4-3d90-40f5-9c5e-fc337a76d7a2"
migrations_dir = "migrations"
